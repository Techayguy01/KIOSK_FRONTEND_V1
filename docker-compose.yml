version: '3.8'

services:
  # 1. THE DATABASE (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: hotel_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: hotel_kiosk
    ports:
      - "5432:5432" # Exposed for local Prisma commands
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. THE GUI (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: hotel_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hotel.com
      PGADMIN_DEFAULT_PASSWORD: rootpassword
    ports:
      - "5050:80"
    depends_on:
      - db

  # 3. THE BACKEND (Node.js API)
  backend:
    build: ./backend
    container_name: hotel_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Connects to 'db' service inside Docker network
      - DATABASE_URL=postgresql://admin:rootpassword@db:5432/hotel_kiosk?schema=public
      - PORT=3000
    depends_on:
      - db

  # 4. THE FRONTEND (React)
  frontend:
    build: ./frontend
    container_name: hotel_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: # Persist data even if containers are deleted
